# Music search recall fixture — FEAT-music-search-recall Step 2 (E2).
#
# Versioned set of writer-facing search queries with their expected top-N
# entities, used by tests/integration/test_search_recall_gate.py to measure
# Hit@5 / Hit@1 against the live catalog. IDs are real prod catalog ids
# (single-writer catalog; existing rows keep their ids as the catalog grows).
#
# Each case:
#   query:        the raw string a writer types into the subject search.
#   category:     multi_token | korean | common_word | typo | alias
#   type:         which bucket the expected ids live in (artist|album|track),
#                 OR `empty` for a valid no-result query (expected_ids must be []).
#   expected_ids: ids that SHOULD surface for this query, most-canonical first.
#                 hit@1 = expected_ids[0] is rank-1 of its bucket.
#                 hit@5 = any expected id appears in the bucket's top 5.
#
# Baseline (Step 2) is EXPECTED to fail the gate — the failing cases (multi-token
# decomposition, typo tolerance) are the diff that Steps 4/6 close. See the RFC
# Decisions log for the recorded baseline numbers.
#
# Gate target DB: $RECALL_GATE_DB_URL (falls back to $TEST_DB_URL). When the
# expected ids are absent from the target catalog the case is reported as a
# data-miss, not a recall failure — keep this fixture pointed at the prod catalog.

cases:
  # ---- multi-token (8): "artist album" combined; current code does not decompose ----
  - query: "방탄소년단 Proof"
    category: multi_token
    type: album
    expected_ids: ["36bac25e-3fa4-473f-b828-5bd45edee144"]
