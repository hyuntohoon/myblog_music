# .github/workflows/deploy.yml
name: Deploy Music Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build zip
        run: |
          mkdir -p lambda_build
          pip install -r requirements.txt -t lambda_build --platform manylinux2014_aarch64 --only-binary=:all:
          cp -r app lambda_build/
          find lambda_build -name "__pycache__" -type d -exec rm -rf {} +
          find lambda_build -name "*.pyc" -delete
          cd lambda_build && zip -r ../lambda_bundle.zip . && cd -
          ls -lh lambda_bundle.zip

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          aws lambda update-function-code \
            --function-name musicApi \
            --zip-file fileb://lambda_bundle.zip \
            --architectures arm64
