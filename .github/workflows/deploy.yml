# .github/workflows/deploy.yml
name: Deploy Music Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git auth for private package
        env:
          SHARED_DB_PAT: ${{ secrets.SHARED_DB_PAT }}
        run: git config --global url."https://${SHARED_DB_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt pyright

      - name: Type check (pyright)
        run: pyright app/

      - name: Run unit tests
        run: pytest -m "not integration"

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git auth for private package
        env:
          SHARED_DB_PAT: ${{ secrets.SHARED_DB_PAT }}
        run: git config --global url."https://${SHARED_DB_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Build zip
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build --platform manylinux2014_aarch64 --only-binary=:all:
          cp -r app build/
          find build -name "__pycache__" -type d -exec rm -rf {} +
          find build -name "*.pyc" -delete
          cd build && zip -r ../bundle.zip . && cd -
          ls -lh bundle.zip

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME:-musicApi}" \
            --zip-file fileb://bundle.zip \
            --architectures arm64
